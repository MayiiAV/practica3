<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practica 3 - GitHub Pages</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: linear-gradient(135deg,#4f46e5,#06b6d4);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            background:white;
            padding:40px;
            border-radius:20px;
            text-align:center;
            width:400px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        h1{
            color:#4f46e5;
            margin-bottom:15px;
        }

        p{
            color:#555;
            margin-bottom:20px;
        }

        .btn{
            display:inline-block;
            background:#4f46e5;
            color:white;
            padding:12px 25px;
            border-radius:10px;
            text-decoration:none;
            transition:0.3s;
        }

        .btn:hover{
            background:#3730a3;
        }
    </style>
</head>

<body>

    <div class="card">
        <h1> Hola Mundo</h1>

        <p>
            Primera pagina web publicada
            con GitHub Pages.
        </p>

        <p>
            Practica 3 - DevOps
        </p>

        <a href="https://github.com/MayiiAV" class="btn">
            Ver mi GitHub
        </a>
    </div>

</body>
</html>
